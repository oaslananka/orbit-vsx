name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    if: github.repository_owner == 'oaslananka'
    name: Node ${{ matrix.node-version }} / VS Code ${{ matrix.vscode-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - node-version: '22'
            vscode-version: '1.100.0'
          - node-version: '24'
            vscode-version: stable
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Enable pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare "$(node -p "require('./package.json').packageManager")" --activate
          pnpm --version

      - run: pnpm install --frozen-lockfile

      - run: pnpm audit --audit-level moderate

      - name: Validate Renovate configuration
        if: matrix.node-version == '24'
        run: pnpm run validate:renovate

      - name: Run complete verification chain
        env:
          ORBIT_VSCODE_TEST_VERSION: ${{ matrix.vscode-version }}
        run: pnpm run verify:headless
