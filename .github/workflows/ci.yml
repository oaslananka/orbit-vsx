name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Select Node.js 24 and enable pnpm
        shell: bash
        run: |
          set -euo pipefail
          node_dir="$(find /opt/hostedtoolcache/node -path '*/24.*/x64/bin' -type d | sort -V | tail -n 1)"
          if [ -z "$node_dir" ]; then
            echo "Node.js 24 was not found in /opt/hostedtoolcache/node" >&2
            exit 1
          fi
          echo "$node_dir" >> "$GITHUB_PATH"
          export PATH="$node_dir:$PATH"
          node --version
          corepack enable
          corepack prepare pnpm@11.3.0 --activate
          pnpm --version

      - run: pnpm install --frozen-lockfile

      - run: pnpm run typecheck

      - run: pnpm run lint

      - run: pnpm run format:check

      - run: pnpm run build

      - name: Run tests
        run: xvfb-run -a pnpm test
