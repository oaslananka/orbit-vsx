name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - uses: actions/setup-node@1d0ff469b7ec8bddb92d1c6c3b0b0c55c7bf3e0e
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Enable pnpm
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@11.3.0 --activate
          pnpm --version

      - run: pnpm install --frozen-lockfile

      - run: pnpm run typecheck

      - run: pnpm run lint

      - run: pnpm run format:check

      - run: pnpm run build

      - name: Run tests
        run: xvfb-run -a pnpm test

      - run: pnpm run coverage

      - name: Run packaged extension smoke test
        run: xvfb-run -a pnpm run test:package
