name: Semgrep

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '37 4 * * 3'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    if: github.repository_owner == 'oaslananka'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install pinned Semgrep CE
        shell: bash
        run: |
          python3 -m venv .semgrep-venv
          .semgrep-venv/bin/python -m pip install --disable-pip-version-check 'semgrep==1.170.0'

      - name: Scan source and tests
        id: scan
        shell: bash
        run: |
          set +e
          .semgrep-venv/bin/semgrep scan \
            --config p/typescript \
            --config p/javascript \
            --config .semgrep.yml \
            --error \
            --metrics=off \
            --sarif \
            --output=semgrep.sarif \
            .
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Semgrep SARIF
        if: >-
          always() &&
          hashFiles('semgrep.sarif') != '' &&
          (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: semgrep.sarif
          category: semgrep-ce

      - name: Enforce Semgrep result
        if: always()
        shell: bash
        run: |
          test "${{ steps.scan.outputs.exit_code }}" = '0'
