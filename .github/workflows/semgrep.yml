name: Semgrep

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '37 4 * * 3'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  semgrep:
    if: github.repository_owner == 'oaslananka'
    permissions:
      contents: read
      security-events: write
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Scan source and tests with digest-pinned Semgrep CE
        id: scan
        shell: bash
        run: |
          set +e
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --env HOME=/tmp \
            --volume "$GITHUB_WORKSPACE:/src" \
            --workdir /src \
            semgrep/semgrep:1.170.0@sha256:c98f8829eea377274ee4b10656458b078b88232469b2ff913f091c2317347c9d \
            semgrep scan \
            --config p/typescript \
            --config p/javascript \
            --config .semgrep.yml \
            --error \
            --metrics=off \
            --sarif \
            --output=semgrep.sarif \
            .
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Semgrep SARIF
        if: >-
          always() &&
          hashFiles('semgrep.sarif') != '' &&
          (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: semgrep.sarif
          category: semgrep-ce

      - name: Enforce Semgrep result
        if: always()
        shell: bash
        run: |
          test "${{ steps.scan.outputs.exit_code }}" = '0'
