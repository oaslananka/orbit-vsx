name: Workflow Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '23 3 * * 2'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  workflow-security:
    if: github.repository_owner == 'oaslananka'
    name: actionlint, ShellCheck, zizmor, and Trivy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install pinned pre-commit runner
        run: python3 -m pip install --disable-pip-version-check 'pre-commit==4.6.0'

      - name: Validate workflow syntax and expressions
        run: pre-commit run actionlint --all-files

      - name: Validate repository shell scripts
        run: pre-commit run shellcheck --all-files

      - name: Audit workflow security
        run: pre-commit run zizmor --all-files

      - name: Scan the headless Dockerfile configuration
        run: bash scripts/run-trivy-config-scan.sh
